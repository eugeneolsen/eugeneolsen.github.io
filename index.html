<!DOCTYPE HTML>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <title>Eugene Olsen</title>

        <style>
            body {
                background-image: linear-gradient(60deg, lightblue, #000020);
                text-align: left;
                color: black;
                height: 100vh;
                position:relative;
                margin: 0; 
                padding: 0;
            }

            body::before {
                content: "";
                position: fixed; /* Covers the whole screen even when scrolling */
                inset: 0;        /* Shorthand for top, right, bottom, left: 0 */
                z-index: -1;     /* Puts it behind text but stays above body background */
                
                /* The tiled pattern layer */
                background-image: url('./images/fresh_snow.webp');
                background-repeat: repeat;
                
                /* 20% Alpha Channel effect */
                opacity: 0.2; 
            }

            h1 {
                text-align: center;
            }
            main {
                display: flex;
                gap: 2em;
                margin: 0 5%;
                position: relative;
                z-index: 1; /* Ensures main content is above the background */
            }
            #showcase {
                flex: 1;
            }
            #profile {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            #portrait {
                width: 100%;
                max-width: 720px;
                margin-top: -4rem;
            }
            footer {
                position: fixed;
                bottom: 0;
                padding-top: 0.5em;
                padding-bottom: 0;
                width: 100%;
                text-align: center;
            }
            .item-links {
                font-size: 2em;
            }
            .item-links a {
                font-size: 0.75em;
            }
            #copyright {
                font-family: Arial, Helvetica, sans-serif;
                font-size: 0.8em;
                background-color: rgba(32, 40, 64, 0.7);
                color: #f0f0f0;
                margin-top: 0.5em;
                margin-bottom: 0;
                margin-left: 0;
                padding-top: .25em;
                padding-bottom: .33em;
                padding-left: 0;;
            }
        </style>


        <!-- 
        *
        *   Scripting Here
        *
        -->
        <script>
        </script>

    </head>


    <body>
        <header>
            <h1>Eugene C. Olsen</h1>
        </header>
        <main>
            <section id="showcase">
                <h2>Project Showcase</h2>
                <p class="item-links">
                    Poet's Pal&trade; &nbsp;
                    <a href="https://github.com/eugeneolsen/eugeneolsen.github.io/blob/master/poetpal/README.md">documentation</a> |
                    <a href="poetpal/index.html" target="_blank">app</a>
                </p>
            </section>
            <section id="profile">
                <img id="portrait" src="./images/eugene.png" alt="Portrait of Eugene C. Olsen">
            </section>
        </main>
        <footer>
            <div id="copyright">
                &copy; 2025 Eugene C. Olsen
            </div>
        </footer>
    </body>
</html>
